<svg xmlns="http://www.svg.org/2000/svg" viewBox="0 0 80 200" width="100%" height="100%">
  <style>
    .text {
      font-family: 'Jost', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 16px;
      fill: #ffffff;
      text-anchor: middle;
      letter-spacing: 1px;
    }
    .icon {
      fill: none;
      stroke: #ffffff;
      stroke-width: 2;
    }
  </style>
  
  <!-- 幾何圖示 -->
  <rect x="25" y="20" width="30" height="30" rx="4" class="icon" />
  <circle cx="40" cy="35" r="4" fill="#ffffff" />
  
  <!-- 垂直排列的文字 -->
  <text x="40" y="80" class="text">Josie</text>
  <text x="40" y="105" class="text">Design</text>
  <text x="40" y="130" class="text">Studio</text>
</svg>