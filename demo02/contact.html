                        <main>

                                        <h2>聯絡我們</h2>
                                        <p>
                                                如果您對我們的產品有任何疑問，或需要客製化蛋糕、企業訂購等服務，歡迎填寫以下表單與我們聯絡。<br />我們將盡快由專人為您回覆。
                                        </p>

                                        <table class="ta1">
                                                <caption>
                                                        聯絡我們
                                                </caption>
                                                <tr>
                                                        <th>姓名※</th>
                                                        <td>
                                                                <input
                                                                        type="text"
                                                                        name="name"
                                                                        size="30"
                                                                        class="ws"
                                                                />
                                                        </td>
                                                </tr>
                                                <tr>
                                                        <th>電子信箱※</th>
                                                        <td>
                                                                <input
                                                                        type="text"
                                                                        name="email"
                                                                        size="30"
                                                                        class="ws"
                                                                />
                                                        </td>
                                                </tr>
                                                <tr>
                                                        <th>聯絡事項※</th>
                                                        <td>
                                                                <textarea
                                                                        name="message"
                                                                        cols="30"
                                                                        rows="10"
                                                                        class="wl"
                                                                ></textarea>
                                                        </td>
                                                </tr>
                                        </table>

                                        <p class="c">
                                                <input
                                                        type="submit"
                                                        class="btn"
                                                        value="送出"
                                                />
                                        </p>
                                </section>
